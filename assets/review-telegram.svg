<svg xmlns="http://www.w3.org/2000/svg" width="760" height="980" viewBox="0 0 760 980" fill="none">
  <rect width="760" height="980" fill="#E8EEF5"/>
  <rect x="0" y="0" width="760" height="86" fill="#5B7FA8"/>
  <circle cx="56" cy="43" r="24" fill="#DADDEB"/>
  <path d="M64 32L44 43L64 54" stroke="#445799" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="120" cy="43" r="26" fill="#F3EDE7"/>
  <text x="160" y="38" fill="white" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Мария</text>
  <text x="160" y="64" fill="rgba(255,255,255,.72)" font-family="Inter, Arial, sans-serif" font-size="15">была в сети недавно</text>
  <g opacity="0.18">
    <circle cx="132" cy="238" r="72" fill="#445799"/>
    <circle cx="630" cy="202" r="104" fill="#445799"/>
    <circle cx="514" cy="840" r="128" fill="#445799"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="42" y="128" width="492" height="134" rx="22" fill="#FFFFFF"/>
    <text x="74" y="172" fill="#535353" font-size="22">Анна, добрый день!</text>
    <text x="74" y="210" fill="#535353" font-size="22">После прошлой встречи я впервые</text>
    <text x="74" y="242" fill="#535353" font-size="22">нормально выспалась.</text>
    <text x="462" y="241" fill="#9AA1AA" font-size="15">10:42</text>

    <rect x="184" y="302" width="532" height="158" rx="22" fill="#DADDEB"/>
    <text x="216" y="348" fill="#26397A" font-size="22">Мария, рада это слышать.</text>
    <text x="216" y="386" fill="#26397A" font-size="22">Давайте в следующий раз аккуратно</text>
    <text x="216" y="418" fill="#26397A" font-size="22">посмотрим, что именно помогло.</text>
    <text x="646" y="438" fill="#6D78A8" font-size="15">10:45</text>

    <rect x="42" y="500" width="622" height="270" rx="22" fill="#FFFFFF"/>
    <text x="74" y="548" fill="#535353" font-size="22">Спасибо вам. Мне очень важно,</text>
    <text x="74" y="586" fill="#535353" font-size="22">что на консультациях нет ощущения,</text>
    <text x="74" y="624" fill="#535353" font-size="22">что меня оценивают.</text>
    <text x="74" y="676" fill="#535353" font-size="22">Стало проще замечать тревогу</text>
    <text x="74" y="714" fill="#535353" font-size="22">и не спорить с собой.</text>
    <text x="592" y="744" fill="#9AA1AA" font-size="15">11:08</text>

    <rect x="184" y="812" width="532" height="92" rx="22" fill="#DADDEB"/>
    <text x="216" y="858" fill="#26397A" font-size="22">Спасибо, что делитесь.</text>
    <text x="646" y="882" fill="#6D78A8" font-size="15">11:12</text>
  </g>
</svg>
